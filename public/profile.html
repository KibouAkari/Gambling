<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil - Mongo Casino</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="profile">
    <div id="navbar-placeholder"></div>

    <main>
      <section class="hero surface fade-in">
        <h2>Player Profile</h2>
        <p>Verwalte deinen Account, Avatar und Basisdaten in einem schnellen, stabilen Bereich.</p>
      </section>

      <div id="auth-container" class="login-box">
        <section id="login-form" class="form-container">
          <h2>Login</h2>
          <input type="text" id="login-username" placeholder="Username" autocomplete="username" />
          <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
          <button id="login-btn" type="button">Login</button>
          <p>Noch kein Konto? <a href="#" id="show-signin">Registrieren</a></p>
          <p id="auth-feedback"></p>
        </section>

        <section id="signin-form" class="form-container hidden">
          <h2>Sign Up</h2>
          <input type="text" id="signin-username" placeholder="Username" autocomplete="username" />
          <input type="email" id="signin-email" placeholder="Email" autocomplete="email" />
          <input type="password" id="signin-password" placeholder="Passwort" autocomplete="new-password" />
          <button id="signin-btn" type="button">Registrieren</button>
          <p>Schon ein Konto? <a href="#" id="show-login">Log in</a></p>
        </section>
      </div>

      <section id="profile-edit-container" class="profile-container hidden">
        <div class="profile-left">
          <div class="profile-picture">
            <img
              src="https://static.vecteezy.com/system/resources/previews/023/465/688/non_2x/contact-dark-mode-glyph-ui-icon-address-book-profile-page-user-interface-design-white-silhouette-symbol-on-black-space-solid-pictogram-for-web-mobile-isolated-illustration-vector.jpg"
              alt="Profilbild"
              id="profile-img"
            />
            <div class="upload-options">
              <input type="file" id="file-upload" accept="image/*" />
              <input type="text" id="url-input" placeholder="Oder Bild URL einfügen" />
            </div>
          </div>
        </div>

        <div class="profile-right">
          <div class="tabs">
            <button class="tab-button active" type="button" data-tab-target="user-tab">User</button>
            <button class="tab-button" type="button" data-tab-target="pay-tab">Pay</button>
          </div>

          <div class="tab-content user-tab active">
            <h2>User Informations</h2>
            <form id="user-form">
              <label for="username">Username:</label>
              <input type="text" id="username" name="username" />

              <label for="email">E-Mail:</label>
              <input type="email" id="email" name="email" />

              <label for="bio">Bio:</label>
              <textarea id="bio" name="bio"></textarea>

              <button type="submit">Speichern</button>
            </form>
          </div>

          <div class="tab-content pay-tab">
            <h2>Zahlungsinformationen</h2>
            <form id="pay-form">
              <label for="creditcard">Kreditkartennummer:</label>
              <input type="text" id="creditcard" name="creditcard" />

              <label for="expiry-date">Ablaufdatum:</label>
              <input type="date" id="expiry-date" name="expiry-date" />

              <label for="cvc">CVC:</label>
              <input type="text" id="cvc" name="cvc" />

              <button type="submit">Speichern</button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer>© 2026 Mongo Casino. Profile data is stored locally for demo purposes.</footer>
    <script src="../scripts/fx.js"></script>
    <script src="../scripts/api.js"></script>
    <script src="../scripts/main.js"></script>
  </body>
</html>
