<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games - Mongo Casino</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="games">
    <div id="navbar-placeholder"></div>

    <main>
      <section class="hero surface fade-in">
        <h2>Game Lobby</h2>
        <p>Finde schnell dein Spiel und springe ohne Ladefrust direkt in die Action.</p>
      </section>

      <h2 class="centered-title">All Games</h2>
      <input
        type="text"
        id="search"
        placeholder="Search games..."
        oninput="searchGames()"
      />

      <div class="game-grid fade-in" id="game-list">
        <article class="game">
          <a href="/games/Slot_Machine/slot.html">
            <img
              src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSKLImqlhsXljBytSwyEX2BpIzEQLXsXVqPow&s"
              alt="Slot Machine"
            />
            <p>Slot Machine</p>
            <span class="badge">Playable</span>
          </a>
        </article>

        <article class="game">
          <img
            src="https://media.istockphoto.com/id/538355056/vector/pocker-cards-flush-hearts-hand.jpg?s=612x612&w=0&k=20&c=5uLrcrC_criJK1LvhOZfQdTId0HUD9qlZXKBWn90Sd8="
            alt="Poker"
          />
          <p>Poker</p>
          <span class="badge">Soon</span>
        </article>

        <article class="game">
          <img
            src="https://gamblebase.com/wp-content/uploads/2022/03/Roulette-Tisch.webp"
            alt="Roulette"
          />
          <p>Roulette</p>
          <span class="badge">Soon</span>
        </article>

        <article class="game">
          <img
            src="https://iconstyle.al/wp-content/uploads/2024/09/6CED10EC-3212-4532-BA8E-F330CF895BD3.jpeg"
            alt="Plinko"
          />
          <p>Plinko</p>
          <span class="badge">Soon</span>
        </article>
      </div>
    </main>

    <footer>© 2026 Mongo Casino. New games are dropping soon.</footer>

    <script src="../scripts/api.js"></script>
    <script>
      function searchGames() {
        const input = document.getElementById("search").value.trim().toLowerCase();
        const games = document.querySelectorAll("#game-list .game");

        games.forEach((game) => {
          const title = game.querySelector("p").textContent.toLowerCase();
          game.style.display = title.includes(input) ? "block" : "none";
        });
      }

      loadNavbar();
    </script>
  </body>
</html>
